name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (data + features + advisor; model tests skip pre-train)
        run: pytest -q

      - name: Run pipeline (clean -> features -> train)
        run: |
          python -m src.data.clean_data
          python -m src.features.build_features
          python -m src.models.train

      - name: Full test suite (model + API tests now active)
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test-train
    steps:
      - uses: actions/checkout@v4
      - name: Build serving image (trains at build time)
        run: docker build -t churn-api .
      - name: Smoke test the container
        run: |
          docker run -d --rm -p 8080:8080 --name churn churn-api
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then ok=1; break; fi
            sleep 2
          done
          [ "$ok" = "1" ] || (docker logs churn; exit 1)
          docker stop churn
